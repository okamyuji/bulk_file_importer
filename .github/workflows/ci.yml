name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  security-scan:
    permissions:
      contents: read
      pull-requests: write
    uses: okamyuji/reusable-workflows/.github/workflows/security-scan.yml@v1

  rails-ci:
    uses: okamyuji/reusable-workflows/.github/workflows/rails-ci.yml@v1
    with:
      run-tests: false
